<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sistema OP - Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-box {
      background: #1e1e1e;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 5px;
      border: none;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #00c896;
      border: none;
      color: white;
      font-weight: bold;
      cursor: pointer;
      border-radius: 5px;
    }
    .msg {
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h2>Login Sistema OP</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Ingresar</button>
  <div class="msg" id="message"></div>
</div>

<script>
  const supabase = window.supabase.createClient(
    "https://qnizwkrpjyuzfmsxsbdn.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFuaXp3a3Jwanl1emZtc3hzYmRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0Nzk3MjksImV4cCI6MjA4ODA1NTcyOX0.zsVLO4deW58NBwPg6vHfUVrq7AIRxQvRYo842wrEnZI"
  );

  async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const message = document.getElementById("message");

    const { data, error } = await supabase.auth.signInWithPassword({
      email,
      password
    });

    if (error) {
      message.innerText = "Error: " + error.message;
      return;
    }

    // Buscar rol
    const { data: profile } = await supabase
      .from("profiles")
      .select("role")
      .eq("id", data.user.id)
      .single();

    message.innerText = "Login exitoso. Rol: " + profile.role;
  }
</script>

</body>
</html>
