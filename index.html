<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sistema OP - Login</title>
  <style>
    body {
      background:#111;
      color:white;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .box {
      background:#1e1e1e;
      padding:30px;
      border-radius:10px;
      width:300px;
      text-align:center;
    }

    input {
      width:100%;
      padding:10px;
      margin-bottom:10px;
      border:none;
      border-radius:5px;
    }

    button {
      width:100%;
      padding:10px;
      background:#00c896;
      border:none;
      border-radius:5px;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    .version {
      position:fixed;
      bottom:10px;
      right:15px;
      font-size:12px;
      opacity:0.6;
    }
  </style>
</head>
<body>

  <div class="box">
    <h3>Login Sistema OP</h3>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="btnLogin">Ingresar</button>
    <div id="message"></div>
  </div>

  <div class="version">
    Versión: 2
  </div>

  <script>
    document.getElementById("btnLogin").addEventListener("click", function() {
      alert("Botón funcionando correctamente");
    });
  </script>

</body>
</html>
