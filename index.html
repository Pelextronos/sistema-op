<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sistema OP</title>

<style>
body {
  background:#111;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.box {
  background:#1e1e1e;
  padding:30px;
  border-radius:10px;
  width:300px;
  text-align:center;
}

input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border:none;
  border-radius:5px;
}

button {
  width:100%;
  padding:10px;
  background:#00c896;
  border:none;
  border-radius:5px;
  color:white;
  font-weight:bold;
}

#message {
  margin-top:10px;
  font-size:13px;
  word-break:break-word;
}

.version {
  position:fixed;
  bottom:10px;
  right:15px;
  font-size:12px;
  opacity:0.6;
}
</style>

</head>
<body>

<div class="box">
  <h3>Login Sistema OP</h3>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Ingresar</button>
  <div id="message">Esperando acción...</div>
</div>

<div class="version">Versión: 7</div>

<script>
async function login() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const message = document.getElementById("message");

  message.innerText = "Enviando petición...";

  try {

    const response = await fetch(
      "https://qnizwkrpjyuzfmsxsbdn.supabase.co/auth/v1/token?grant_type=password",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "apikey": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFuaXp3a3Jwanl1emZtc3hzYmRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0Nzk3MjksImV4cCI6MjA4ODA1NTcyOX0.zsVLO4deW58NBwPg6vHfUVrq7AIRxQvRYo842wrEnZI"
        },
        body: JSON.stringify({
          email: email,
          password: password
        })
      }
    );

    const data = await response.json();

    if (!response.ok) {
      message.innerText = "ERROR: " + (data.error_description || data.error);
      message.style.color = "red";
      return;
    }

    message.innerText = "Login correcto ✔";
    message.style.color = "lime";

    setTimeout(() => {
      window.location.href = "panel.html";
    }, 1000);

  } catch (err) {
    message.innerText = "Error conexión: " + err;
    message.style.color = "orange";
  }
}
</script>

</body>
</html>
