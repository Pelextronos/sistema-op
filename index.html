<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sistema OP - Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      background:#111;
      color:white;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .box {
      background:#1e1e1e;
      padding:30px;
      border-radius:10px;
      width:300px;
      text-align:center;
    }

    input {
      width:100%;
      padding:10px;
      margin-bottom:10px;
      border:none;
      border-radius:5px;
    }

    button {
      width:100%;
      padding:10px;
      background:#00c896;
      border:none;
      border-radius:5px;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    #message {
      margin-top:10px;
      font-size:13px;
      word-break: break-word;
    }

    .version {
      position:fixed;
      bottom:10px;
      right:15px;
      font-size:12px;
      opacity:0.6;
    }
  </style>
</head>
<body>

<div class="box">
  <h3>Login Sistema OP</h3>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button id="btnLogin">Ingresar</button>
  <div id="message">Cargando...</div>
</div>

<div class="version">
  Versión: 5
</div>

<script>
  const message = document.getElementById("message");

  if (window.supabase) {
    message.innerText = "Supabase cargado ✔";
  } else {
    message.innerText = "Supabase NO cargado ❌";
  }

  document.getElementById("btnLogin").addEventListener("click", async function() {

    message.innerText = "Botón detectado ✔";

    try {
      const supabase = window.supabase.createClient(
        "https://qnizwkrpjyuzfmsxsbdn.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFuaXp3a3Jwanl1emZtc3hzYmRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0Nzk3MjksImV4cCI6MjA4ODA1NTcyOX0.zsVLO4deW58NBwPg6vHfUVrq7AIRxQvRYo842wrEnZI"
      );

      message.innerText = "Intentando conectar...";

      const { data, error } = await supabase.auth.getSession();

      if (error) {
        message.innerText = "Error conexión: " + error.message;
      } else {
        message.innerText = "Conectado a Supabase ✔";
      }

    } catch (err) {
      message.innerText = "CATCH: " + err;
    }

  });
</script>

</body>
</html>
