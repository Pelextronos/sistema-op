<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sistema OP - Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      background:#111;
      color:white;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }
    .box {
      background:#1e1e1e;
      padding:30px;
      border-radius:10px;
      width:300px;
    }
    input {
      width:100%;
      padding:10px;
      margin-bottom:10px;
      border:none;
      border-radius:5px;
    }
    button {
      width:100%;
      padding:10px;
      background:#00c896;
      border:none;
      border-radius:5px;
      color:white;
      font-weight:bold;
    }
  </style>
</head>
<body>

<div class="box">
  <h3>Login Sistema OP</h3>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Ingresar</button>
  <p id="message"></p>
</div>

<script>
  const supabase = window.supabase.createClient(
    "https://qnizwkrpjyuzfmsxsbdn.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFuaXp3a3Jwanl1emZtc3hzYmRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0Nzk3MjksImV4cCI6MjA4ODA1NTcyOX0.zsVLO4deW58NBwPg6vHfUVrq7AIRxQvRYo842wrEnZI"
  );

  async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const message = document.getElementById("message");

    const { data, error } = await supabase.auth.signInWithPassword({
      email: email,
      password: password
    });

    if (error) {
      message.innerText = "Error: " + error.message;
    } else {
      message.innerText = "Login correcto!";
      window.location.href = "panel.html";
    }
  }
</script>

</body>
</html>
